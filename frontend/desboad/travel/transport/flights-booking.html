<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Ticket Booking</title>
    <link rel="stylesheet" href="../../shared.css">
    <link rel="stylesheet" href="booking.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body data-protect="true" data-home="../../../index.html" data-transport-type="flights">
    <nav class="booking-nav">
        <a href="flights.html">← Back to Flights</a>
        <div>FLIGHT TICKETS</div>
        <button class="mini-chip" data-logout data-redirect="../../../index.html">Logout</button>
    </nav>
    <main class="booking-shell">
        <div class="booking-layout">
            <section id="visualCard" class="visual-card">
                <div class="visual-copy">
                    <span class="meta-chip" id="packageLabel"></span>
                    <h1 id="transportTitle"></h1>
                    <p id="transportIntro"></p>
                </div>
            </section>
            <section class="form-card">
                <h2>Reserve ticket</h2>
                <p>Complete this flight-style booking form and the route will also appear in the cart page.</p>
                <form id="transportBookingForm" class="booking-form">
                    <label>Name <input id="transportName" type="text" required></label>
                    <label>Package <input id="packageInput" type="text" readonly></label>
                    <label>Date <input id="transportDate" type="date" required></label>
                    <label>Time <input id="transportTime" type="time" required></label>
                    <label>Travelers <input id="transportPeople" type="number" min="1" value="1" required></label>
                    <label>Notes <textarea id="transportNotes" placeholder="Seat preference, airport request, or route note"></textarea></label>
                    <button class="booking-submit" type="submit">Book Flight Ticket</button>
                </form>
            </section>
        </div>
    </main>
    <script src="../../shared.js"></script>
    <script src="booking.js"></script>
</body>
</html>
